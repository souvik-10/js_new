<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">

0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete.
    
</body>
<script>
    const requestUrl = 'https://api.github.com/users/souvik-10'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl); // used to create (open) api method to initiate.
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText); // (JSON.parse) is used to change string to json format.
            console.log(typeof data); // used to check the type of the data.\
            console.log(data.followers); // used to retrieve the followers from the data.
            
            
            


            
            
        }
        
    } // it helps to monitor the continue state changes in Api
    // console.log("here");
    console.log(xhr.readyState); // it changes the api state.
    
    
    xhr.send(); // (send) is actually used call the (open) method.
    
 


</script>
</html>
